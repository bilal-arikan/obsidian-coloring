<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Install File Color Picker via BRAT</title>
	<meta name="robots" content="noindex" />
	<style>
		:root { color-scheme: light dark; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			display: flex; min-height: 100vh; margin: 0; align-items: center;
			justify-content: center; background: #1e1e1e; color: #eee; text-align: center;
		}
		.card { max-width: 420px; padding: 32px; }
		h1 { font-size: 1.3rem; margin: 0 0 12px; }
		p { color: #aaa; line-height: 1.5; }
		a.btn {
			display: inline-block; margin-top: 16px; padding: 12px 22px; border-radius: 8px;
			background: #7c3aed; color: #fff; text-decoration: none; font-weight: 600;
		}
		code { background: #333; padding: 2px 6px; border-radius: 4px; }
	</style>
	<script>
		// Forward to the Obsidian BRAT URI as soon as the page loads.
		var uri = "obsidian://brat?plugin=bilal-arikan/obsidian-coloring";
		window.location.replace(uri);
	</script>
</head>
<body>
	<div class="card">
		<h1>Opening Obsidian…</h1>
		<p>
			Asking <strong>BRAT</strong> to add
			<code>bilal-arikan/obsidian-coloring</code>.
		</p>
		<p>If nothing happens, tap the button below or paste the link into Obsidian.</p>
		<a class="btn" href="obsidian://brat?plugin=bilal-arikan/obsidian-coloring">
			Add via BRAT
		</a>
		<p style="margin-top:24px;font-size:0.85rem;">
			Requires the
			<a href="https://github.com/TfTHacker/obsidian42-brat" style="color:#9b7be8;">BRAT</a>
			plugin installed in Obsidian.
		</p>
	</div>
</body>
</html>
